<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>매장닥터 — 소상공인 AI 매출·매입 관리</title>
    <meta name="description" content="영수증 사진 한 장으로 끝내는 매장 장부. 캐시노트는 매출만 잡아주지만, 매장닥터는 매입까지 잡아서 진짜 순이익을 보여줍니다." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="canonical" href="https://connectai-lab-template-coral.vercel.app" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

    <!-- JSON-LD Structured Data for SEO & GEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "매장닥터",
      "image": "https://connectai-lab-template-coral.vercel.app/favicon.png",
      "description": "영수증 사진 한 장으로 완성하는 AI 소상공인 매출·매입 손익 관리 장부 솔루션.",
      "brand": {
        "@type": "Brand",
        "name": "매장닥터"
      },
      "offers": {
        "@type": "Offer",
        "priceCurrency": "KRW",
        "price": "0",
        "valueAddedTaxIncluded": "true",
        "priceValidUntil": "2026-12-31"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "매장닥터는 어떤 서비스인가요?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "매장닥터는 영수증이나 POS 마감 정산서 사진을 찍으면 AI가 자동으로 품목과 금액을 분석(파싱)하여 실시간 매출, 매입, 마진율 및 순이익을 완성해 주는 자영업 장부 앱 서비스입니다."
          }
        },
        {
          "@type": "Question",
          "name": "기존 카드 매출 장부 솔루션과 무엇이 다른가요?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "기존 솔루션은 카드 매출과 입금 위주로 관리하지만, 매장닥터는 종이 영수증 및 간이 영수증 매입, 인건비와 임대료 등 수동 고정비 지출까지 통합 관리하여 매장의 '진짜 실시간 순이익'을 정확히 산출해 주는 점이 다릅니다."
          }
        },
        {
          "@type": "Question",
          "name": "베타 서비스 기간의 이용 금액은 얼마인가요?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "베타 기간에는 모든 플랜(Basic, Pro, Premium)의 핵심 기능과 AI 분석 보고서까지 100% 무료로 제한 없이 사용해 보실 수 있습니다."
          }
        }
      ]
    }
    </script>

    <!-- Google Fonts: Space Mono + Anton SC -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
